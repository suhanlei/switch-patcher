vendor: H3C
netmiko_type: hp_comware
remote_dir: "flash:/"
# H3C设备display输出量大，需要更大的接收缓冲区（40MB，其他厂商仅400KB）
recv_buffer_size: 40960000

# SCP/SFTP状态检查命令（先确认设备是否已开启，再决定是否需要执行使能）
check_scp_commands:
  - command: "display cur | in scp"
    key: scp
  - command: "display cur | in sftp"
    key: sftp

# SCP/SFTP前置使能命令（仅对scp_status=none的设备执行）
scp_enable_commands:
  - command: system-view
    description: 进入系统视图
  - command: scp server enable
    description: 启用SCP服务
  - command: sftp server enable
    description: 启用SFTP服务

pre_check:
  - command: display patch information
    key: patch_info
  - command: display device
    key: device

activate:
  - command: "install activate patch flash:/{patch_file}"
    description: 激活补丁（交互式，需确认Y）
    # H3C install activate命令会提示"Continue?[Y/N]:", 需自动回答Y
    expect_pattern: "[Yy]/[Nn]"
    auto_reply: "Y"
  - command: install commit
    description: 确认补丁

post_check:
  - command: display patch information
    key: patch_info

rollback:
  - command: "install deactivate patch flash:/{patch_file}"
    description: 去激活补丁
  - command: install commit
    description: 确认去激活
  - command: "delete flash:/{patch_file}"
    description: 删除补丁文件(可选)

save: save force
patch_id_pattern: "Patch name:\\s*(\\S+)"
error_patterns:
  - "Error"
  - "Unrecognized command"
  - "Incomplete command"
  - "Ambiguous command"
  - "Wrong parameter"
  - "Failed to"
  - "No such file"
  # H3C特有错误模式：补丁已激活或补丁不兼容
  - "cannot be activated again"
  - "not compliant"
md5_command: "md5sum flash:/{patch_file}"
# 文件校验方式：H3C使用MD5哈希值精确校验
verify_method: md5
